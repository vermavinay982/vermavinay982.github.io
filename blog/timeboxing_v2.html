<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Boxer: Command Center</title>
    <style>
        :root {
            /* High-Tech Sci-Fi Variables */
            --bg-color: #05050a;
            --card-bg: rgba(10, 10, 18, 0.85);
            --text-main: #ffffff;
            --text-secondary: #00f3ffaa;
            --border-color: rgba(0, 243, 255, 0.15);
            
            /* Category Colors */
            --sf-core: #00f3ff;   /* Cyan */
            --sf-must: #ffaa00;   /* Orange */
            --sf-reward: #af52de; /* Purple */
            
            --accent-red: #ff003c;
            --accent-green: #34c759;
            --accent-orange: #ffaa00;
        }

        * { box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden; 
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 243, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        /* Animated glowing border effect */
        @keyframes breathe {
            0% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.05); }
            50% { box-shadow: 0 0 20px rgba(0, 243, 255, 0.15); }
            100% { box-shadow: 0 0 10px rgba(0, 243, 255, 0.05); }
        }

        .container { width: 100%; max-width: 1400px; display: flex; flex-direction: column; height: 100%; }

        /* --- STICKY HEADER --- */
        .sticky-header {
            background: linear-gradient(180deg, var(--bg-color) 70%, transparent);
            padding: 20px 30px 10px 30px;
            z-index: 100; flex-shrink: 0; display: flex; flex-direction: column;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .app-title { 
            font-size: 24px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 15px var(--sf-core); color: var(--sf-core);
        }
        
        .control-btns { display: flex; gap: 10px; }
        .action-btn {
            background: rgba(0, 243, 255, 0.05); border: 1px solid var(--border-color);
            color: var(--sf-core); padding: 8px 16px; border-radius: 4px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .action-btn:hover { background: rgba(0, 243, 255, 0.15); box-shadow: 0 0 15px rgba(0,243,255,0.3); }

        /* Dashboard Top Layout */
        .dashboard-grid {
            display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 20px; margin-bottom: 10px;
        }

        .panel {
            background: var(--card-bg); padding: 15px; border-radius: 8px;
            border: 1px solid var(--border-color); animation: breathe 4s infinite ease-in-out;
            backdrop-filter: blur(10px);
        }

        /* Analytics Pie Charts */
        .charts-container { display: flex; justify-content: space-around; align-items: center; }
        .chart-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .pie-chart {
            width: 80px; height: 80px; border-radius: 50%;
            background: conic-gradient(var(--border-color) 0 100%);
            box-shadow: 0 0 15px rgba(0,0,0,0.5) inset, 0 0 10px rgba(0,243,255,0.2);
            position: relative;
        }
        .pie-chart::after {
            content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            background: var(--card-bg); border-radius: 50%;
        }
        .chart-title { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; font-weight: 600;}

        /* Progress Bars */
        .progress-container { display: flex; flex-direction: column; gap: 12px; justify-content: center;}
        .progress-row { display: flex; align-items: center; gap: 10px; }
        .progress-label { font-size: 10px; font-weight: 700; width: 85px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .progress-track { height: 6px; background-color: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; flex-grow: 1; display: flex;}
        .progress-fill.time { background-color: var(--accent-red); transition: width 1s linear; box-shadow: 0 0 10px var(--accent-red);}
        .progress-fill.utilized { background-color: var(--sf-core); transition: width 0.3s; box-shadow: 0 0 10px var(--sf-core);}
        .progress-fill.unallocated { background-color: rgba(255,255,255,0.3); transition: width 0.3s; }

        /* Timer Dashboard */
        .timer-display { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .timer-display h2 { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin: 0 0 5px 0; letter-spacing: 2px;}
        .timer-display h1 { font-size: 64px; margin: 0; font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .countdown-mins { font-size: 13px; color: var(--sf-core); font-weight: 600; margin-top: 5px; }

        /* --- SCROLLABLE 3-COLUMN MATRIX --- */
        .scroll-content { padding: 10px 30px 40px 30px; overflow-y: auto; flex-grow: 1; }
        
        .matrix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        .column-header {
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800;
            padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .col-core { color: var(--sf-core); border-bottom-color: var(--sf-core); text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);}
        .col-must { color: var(--sf-must); border-bottom-color: var(--sf-must); text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);}
        .col-reward { color: var(--sf-reward); border-bottom-color: var(--sf-reward); text-shadow: 0 0 10px rgba(175, 82, 222, 0.4);}

        .task-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;}
        
        /* Task Cards */
        .task-card { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); 
            padding: 12px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px;
        }
        .task-header { display: flex; justify-content: space-between; align-items: center; }
        .task-name { font-weight: 600; font-size: 14px; color: #fff;}
        .task-meta { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;}
        .task-time { font-weight: 700; font-size: 14px;}
        
        /* Category specific accents inside cards */
        .card-core .task-time { color: var(--sf-core); }
        .card-must .task-time { color: var(--sf-must); }
        .card-reward .task-time { color: var(--sf-reward); }
        
        .icon-btn { background: none; border: none; cursor: pointer; padding: 0; transition: transform 0.2s;}
        .icon-btn:hover { transform: scale(1.1); }
        .icon-btn.done { color: var(--accent-green); font-size: 20px; margin-right: 8px; }
        .icon-btn.start { color: #fff; font-size: 18px; margin-right: 8px; }
        
        /* Mini Progress inside cards */
        .mini-progress { height: 2px; background: rgba(255,255,255,0.1); width: 100%; margin-top: 4px; }
        .mini-progress-fill { height: 100%; transition: 0.3s; }
        .card-core .mini-progress-fill { background: var(--sf-core); box-shadow: 0 0 5px var(--sf-core); }
        .card-must .mini-progress-fill { background: var(--sf-must); box-shadow: 0 0 5px var(--sf-must); }
        .card-reward .mini-progress-fill { background: var(--sf-reward); box-shadow: 0 0 5px var(--sf-reward); }

        /* Sliders */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.1); outline: none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: #fff; cursor: pointer; box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* Add Input Rows */
        .add-task-row { display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; border: 1px dashed rgba(255,255,255,0.1);}
        .add-task-row input { 
            flex-grow: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 13px;
        }
        .add-task-row input::placeholder { color: rgba(255,255,255,0.3); }
        .add-btn { color: #fff; font-size: 20px; opacity: 0.5; }
        .add-btn:not(:disabled) { opacity: 1; text-shadow: 0 0 5px #fff; }

        /* Schedule Config */
        .schedule-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .schedule-row input { background: transparent; color: var(--sf-core); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 14px;}

        /* --- GLOBAL FOCUS MODE --- */
        body.focus-mode .scroll-content, body.focus-mode .dashboard-grid > div:not(.timer-display):not(.progress-container) { display: none !important; }
        body.focus-mode .sticky-header { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh;
            background: var(--bg-color); padding: 40px; align-items: center; justify-content: center; z-index: 999;
        }
        body.focus-mode .top-bar { position: absolute; top: 20px; right: 30px; width: auto; }
        body.focus-mode .dashboard-grid { display: flex; flex-direction: column; width: 100%; max-width: 800px; gap: 40px;}
        body.focus-mode .progress-container { border: none; box-shadow: none; background: transparent; }
        body.focus-mode .timer-display h1 { font-size: clamp(80px, 12vw, 160px); }
        body.focus-mode .countdown-mins { font-size: 24px; }
        /* BUG FIX: Hide progress labels in global focus mode */
        body.focus-mode .progress-label { display: none !important; }
        body.focus-mode .progress-row { gap: 0; }

        /* --- SCI-FI TASK FOCUS OVERLAY --- */
        .sf-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color); z-index: 2000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
            font-family: 'Courier New', Courier, monospace;
        }
        .sf-overlay.active { opacity: 1; pointer-events: auto; }

        .sf-header { text-align: center; margin-bottom: 30px; }
        .sf-header h2 { font-size: 28px; text-transform: uppercase; letter-spacing: 3px; margin: 0; }
        .sf-header p { margin: 5px 0 0 0; font-size: 14px; letter-spacing: 2px;}

        .sf-ring-container { position: relative; width: 320px; height: 320px; margin-bottom: 40px; }
        .sf-ring { width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
        .sf-ring circle { fill: none; stroke-width: 6; stroke-linecap: round; }
        .sf-ring-bg { stroke: rgba(255,255,255,0.05); }
        .sf-ring-fg { 
            stroke-dasharray: 816.8; stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }

        .sf-time-display {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .sf-countdown { font-size: 64px; font-weight: bold; color: #fff; line-height: 1; text-shadow: 0 0 20px rgba(255,255,255,0.2);}
        .sf-label { font-size: 12px; letter-spacing: 3px; margin-top: 8px; color: rgba(255,255,255,0.5);}

        .sf-controls { width: 80%; max-width: 400px; margin-bottom: 40px; }
        .sf-controls-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; text-transform: uppercase;}
        input[type="range"].sf-slider { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        input[type="range"].sf-slider::-webkit-slider-thumb { width: 16px; height: 24px; border-radius: 2px; }

        .sf-actions { display: flex; gap: 20px; }
        .sf-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 12px 24px; font-size: 14px; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: 'Courier New', monospace;
        }
        .sf-btn:hover { background: rgba(255,255,255,0.1); }
        .sf-btn-primary { border: 2px solid; font-weight: bold; }

        /* Task Theme Classes for Focus Overlay */
        .theme-core { --theme-color: var(--sf-core); }
        .theme-must { --theme-color: var(--sf-must); }
        .theme-reward { --theme-color: var(--sf-reward); }
        
        .sf-overlay.theme-core .sf-header h2, .sf-overlay.theme-core .sf-controls-header { color: var(--theme-color); text-shadow: 0 0 15px var(--theme-color); }
        .sf-overlay.theme-must .sf-header h2, .sf-overlay.theme-must .sf-controls-header { color: var(--theme-color); text-shadow: 0 0 15px var(--theme-color); }
        .sf-overlay.theme-reward .sf-header h2, .sf-overlay.theme-reward .sf-controls-header { color: var(--theme-color); text-shadow: 0 0 15px var(--theme-color); }

        .sf-overlay .sf-ring-fg { stroke: var(--theme-color); filter: drop-shadow(0 0 10px var(--theme-color)); }
        .sf-overlay .sf-header p { color: var(--theme-color); }
        .sf-overlay input[type="range"].sf-slider::-webkit-slider-thumb { background: var(--theme-color); box-shadow: 0 0 15px var(--theme-color); }
        .sf-overlay .sf-btn-primary { border-color: var(--theme-color); color: var(--theme-color); box-shadow: 0 0 15px rgba(255,255,255,0.1) inset; }

        @keyframes pulse-critical { 0% { filter: drop-shadow(0 0 5px #ff003c); opacity: 1; stroke: #ff003c;} 50% { filter: drop-shadow(0 0 25px #ff003c); opacity: 0.6; stroke: #ff003c;} 100% { filter: drop-shadow(0 0 5px #ff003c); opacity: 1; stroke: #ff003c;} }
        .sf-critical .sf-ring-fg { animation: pulse-critical 1s infinite !important; stroke: #ff003c !important;}

        @media print { body { display: block; } .container { max-width: 100%; display: block; } .sf-overlay { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="top-bar">
            <div class="app-title">Time Boxer</div>
            <div class="control-btns">
                <button class="action-btn" onclick="toggleGlobalFocusMode()" id="focus-btn">🔭 Global Focus</button>
                <button class="action-btn" onclick="window.print()">📄 Print Report</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="panel charts-container">
                <div class="chart-box">
                    <div class="chart-title">Time Allocation</div>
                    <div class="pie-chart" id="pie-time"></div>
                </div>
                <div class="chart-box">
                    <div class="chart-title">Task Volume</div>
                    <div class="pie-chart" id="pie-count"></div>
                </div>
            </div>

            <div class="panel progress-container">
                <div class="progress-row" title="Day Elapsed vs Remaining">
                    <span class="progress-label">Day Clock</span>
                    <div class="progress-track"><div class="progress-fill time" id="progress-time"></div></div>
                </div>
                <div class="progress-row" title="Work Completed">
                    <span class="progress-label">Utilized</span>
                    <div class="progress-track"><div class="progress-fill utilized" id="progress-utilized"></div></div>
                </div>
                <div class="progress-row" title="Free Time Remaining">
                    <span class="progress-label">Balance</span>
                    <div class="progress-track"><div class="progress-fill unallocated" id="progress-unallocated"></div></div>
                </div>
            </div>

            <div class="panel timer-display">
                <h2>Time Remaining Today</h2>
                <h1 id="countdown">00:00:00</h1>
                <div class="countdown-mins" id="countdown-mins">0 total minutes</div>
            </div>
        </div>
        
        <div class="schedule-row">
            <div><span style="font-size:12px; color:var(--text-secondary); text-transform:uppercase;">Start: </span><input type="time" id="start-time"></div>
            <div><span style="font-size:12px; color:var(--text-secondary); text-transform:uppercase;">End: </span><input type="time" id="end-time"></div>
        </div>
    </div>

    <div class="scroll-content">
        <div class="matrix-grid">
            
            <div class="matrix-col">
                <div class="column-header col-core">
                    <span>Core Work</span>
                    <span id="core-total" style="font-size: 11px;">0 min</span>
                </div>
                <div class="task-list" id="list-core"></div>
                <div class="add-task-row">
                    <input type="text" id="new-core" placeholder="Add Core task (e.g., Thesis)..." onkeyup="checkInput(event, 'core')">
                    <button class="icon-btn add-btn" id="btn-core" onclick="addTask('core')" disabled>⊕</button>
                </div>
            </div>

            <div class="matrix-col">
                <div class="column-header col-must">
                    <span>Musts & Deadlines</span>
                    <span id="must-total" style="font-size: 11px;">0 min</span>
                </div>
                <div class="task-list" id="list-must"></div>
                <div class="add-task-row">
                    <input type="text" id="new-must" placeholder="Add Must task (e.g., Assignment)..." onkeyup="checkInput(event, 'must')">
                    <button class="icon-btn add-btn" id="btn-must" onclick="addTask('must')" disabled>⊕</button>
                </div>
            </div>

            <div class="matrix-col">
                <div class="column-header col-reward">
                    <span>Rewards & Growth</span>
                    <span id="reward-total" style="font-size: 11px;">0 min</span>
                </div>
                <div class="task-list" id="list-reward"></div>
                <div class="add-task-row">
                    <input type="text" id="new-reward" placeholder="Add Reward task (e.g., Reading)..." onkeyup="checkInput(event, 'reward')">
                    <button class="icon-btn add-btn" id="btn-reward" onclick="addTask('reward')" disabled>⊕</button>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="sf-overlay" class="sf-overlay">
    <div class="sf-header">
        <h2 id="sf-task-name">Task Name</h2>
        <p id="sf-task-status">SYSTEM ACTIVE</p>
    </div>

    <div class="sf-ring-container" id="sf-ring-wrapper">
        <svg class="sf-ring" viewBox="0 0 280 280">
            <circle class="sf-ring-bg" cx="140" cy="140" r="130"></circle>
            <circle id="sf-ring-progress" class="sf-ring-fg" cx="140" cy="140" r="130"></circle>
        </svg>
        <div class="sf-time-display">
            <div id="sf-countdown" class="sf-countdown">00:00</div>
            <div class="sf-label" id="sf-label">TIME REMAINING</div>
        </div>
    </div>

    <div class="sf-controls">
        <div class="sf-controls-header">
            <span>Progress Upload</span>
            <span id="sf-completion-val">0%</span>
        </div>
        <input type="range" class="sf-slider" id="sf-completion-slider" min="0" max="100" value="0" oninput="updateTaskCompletion(this.value)">
    </div>

    <div class="sf-actions">
        <button class="sf-btn" onclick="stopTaskFocus()">⏸ PAUSE & EXIT</button>
        <button class="sf-btn sf-btn-primary" onclick="finishTaskFromFocus()">✓ INITIATE COMPLETION</button>
    </div>
</div>

<script>
    let state = {
        startTime: "09:00", endTime: "17:00",
        tasks: [
            { id: '1', name: "PhD Thesis Chapter 3", allocated: 120, elapsed: 0, completion: 0, category: 'core' }, 
            { id: '2', name: "Grade Undergrad Assignments", allocated: 45, elapsed: 0, completion: 0, category: 'must' },
            { id: '3', name: "Read Sci-Fi Novel", allocated: 30, elapsed: 0, completion: 0, category: 'reward' }
        ],
        globalFocusMode: false
    };

    let remainingSecondsDay = 0;
    let activeTaskId = null; 

    function init() {
        loadData();
        state.globalFocusMode = false; 
        applyGlobalFocusUI();

        document.getElementById('start-time').value = state.startTime;
        document.getElementById('end-time').value = state.endTime;
        document.getElementById('start-time').addEventListener('change', (e) => { state.startTime = e.target.value; saveData(); tick(); });
        document.getElementById('end-time').addEventListener('change', (e) => { state.endTime = e.target.value; saveData(); tick(); });
        
        renderTasks(); tick(); setInterval(tick, 1000);

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                if(state.globalFocusMode) { state.globalFocusMode = false; applyGlobalFocusUI(); }
                if(activeTaskId) { stopTaskFocus(); } 
            }
        });
    }

    // --- Global Focus ---
    function toggleGlobalFocusMode() { 
        state.globalFocusMode = !state.globalFocusMode; applyGlobalFocusUI(); 
        handleFullscreen(state.globalFocusMode);
    }
    function applyGlobalFocusUI() {
        document.body.classList.toggle('focus-mode', state.globalFocusMode);
        document.getElementById('focus-btn').innerText = state.globalFocusMode ? "✕ Exit Focus" : "🔭 Global Focus";
    }

    function handleFullscreen(turnOn) {
        if (turnOn && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        else if (!turnOn && document.exitFullscreen && document.fullscreenElement) document.exitFullscreen();
    }

    // --- Main Tick Logic ---
    function tick() {
        const now = new Date();
        const start = parseTime(state.startTime), end = parseTime(state.endTime);
        remainingSecondsDay = now >= start && now <= end ? (end - now) / 1000 : (now < start ? (end - start) / 1000 : 0);
        
        if (activeTaskId) {
            const task = state.tasks.find(t => t.id === activeTaskId);
            if (task) { task.elapsed += 1; updateSciFiUI(task); } 
            else stopTaskFocus(); 
        }

        enforceLimits(); 
        updateMainUI();
    }

    // --- Sci-Fi Task Focus Logic ---
    function startTaskFocus(taskId) {
        const task = state.tasks.find(t => t.id === taskId);
        if(!task) return;
        
        activeTaskId = taskId;
        const overlay = document.getElementById('sf-overlay');
        overlay.classList.add('active');
        
        // Apply Color Theme based on Category
        overlay.className = `sf-overlay active theme-${task.category}`;

        document.getElementById('sf-task-name').innerText = task.name;
        document.getElementById('sf-completion-slider').value = task.completion;
        document.getElementById('sf-completion-val').innerText = `${task.completion}%`;
        
        handleFullscreen(true);
        updateSciFiUI(task);
    }

    function stopTaskFocus() {
        activeTaskId = null;
        document.getElementById('sf-overlay').classList.remove('active');
        handleFullscreen(false);
        saveData();
        renderTasks(); 
    }

    function finishTaskFromFocus() {
        if(activeTaskId) {
            const id = activeTaskId;
            stopTaskFocus(); 
            markDone(id);
        }
    }

    function updateTaskCompletion(val) {
        if(!activeTaskId) return;
        const task = state.tasks.find(t => t.id === activeTaskId);
        if(task) {
            task.completion = parseInt(val);
            document.getElementById('sf-completion-val').innerText = `${task.completion}%`;
        }
    }

    function updateSciFiUI(task) {
        const totalSeconds = task.allocated * 60;
        const remaining = Math.max(0, totalSeconds - task.elapsed);
        
        document.getElementById('sf-countdown').innerText = formatTime(remaining);
        document.getElementById('sf-label').innerText = remaining === 0 ? "TIME DEPLETED" : "TIME REMAINING";

        const ring = document.getElementById('sf-ring-progress');
        const wrapper = document.getElementById('sf-ring-wrapper');
        const dashOffset = 816.8 * (1 - (remaining / totalSeconds));
        ring.style.strokeDashoffset = isNaN(dashOffset) ? 0 : dashOffset;

        const ratio = totalSeconds > 0 ? remaining / totalSeconds : 0;
        wrapper.className = 'sf-ring-container'; 
        if (ratio <= 0.2 && remaining > 0) wrapper.classList.add('sf-critical');
        
        if (remaining === 0) ring.style.stroke = "rgba(255,255,255,0.2)"; 
        else ring.style.stroke = ""; 
    }

    // --- Main UI Updating ---
    function updateMainUI() {
        document.getElementById('countdown').innerText = formatTime(remainingSecondsDay);
        document.getElementById('countdown-mins').innerText = `${Math.floor(remainingSecondsDay / 60)} total minutes`;

        const totalMins = Math.max(0, (parseTime(state.endTime) - parseTime(state.startTime)) / 60000);
        const unallocated = Math.max(0, (remainingSecondsDay / 60) - state.tasks.filter(t => t.completion < 100).reduce((s, t) => s + t.allocated, 0));
        const utilized = state.tasks.filter(t => t.completion === 100).reduce((s, t) => s + t.allocated, 0);

        document.getElementById('progress-time').style.width = totalMins > 0 ? `${Math.min(100, ((totalMins*60 - remainingSecondsDay)/(totalMins*60))*100)}%` : '0%';
        document.getElementById('progress-utilized').style.width = totalMins > 0 ? `${(utilized/totalMins)*100}%` : '0%';
        document.getElementById('progress-unallocated').style.width = totalMins > 0 ? `${(unallocated/totalMins)*100}%` : '0%';

        updateCharts();

        state.tasks.forEach(t => {
            if(t.completion < 100) {
                const s = document.getElementById(`slider-${t.id}`), l = document.getElementById(`label-${t.id}`);
                if(s && l && !activeTaskId) { 
                    s.max = t.allocated + unallocated; s.value = t.allocated; l.innerText = `${Math.floor(t.allocated)} min`; 
                }
            }
        });
    }

    function updateCharts() {
        const cats = ['core', 'must', 'reward'];
        const colors = {'core': 'var(--sf-core)', 'must': 'var(--sf-must)', 'reward': 'var(--sf-reward)'};
        
        // Time Chart
        const totalAlc = state.tasks.reduce((s, t) => s + t.allocated, 0) || 1; // avoid /0
        let timeStops = [], currPct = 0;
        cats.forEach(c => {
            const sum = state.tasks.filter(t => t.category === c).reduce((s, t) => s + t.allocated, 0);
            const pct = (sum / totalAlc) * 100;
            if(pct > 0) { timeStops.push(`${colors[c]} ${currPct}% ${currPct + pct}%`); currPct += pct; }
        });
        document.getElementById('pie-time').style.background = timeStops.length ? `conic-gradient(${timeStops.join(', ')})` : 'none';

        // Count Chart
        const totalCount = state.tasks.length || 1;
        let countStops = []; currPct = 0;
        cats.forEach(c => {
            const count = state.tasks.filter(t => t.category === c).length;
            const pct = (count / totalCount) * 100;
            if(pct > 0) { countStops.push(`${colors[c]} ${currPct}% ${currPct + pct}%`); currPct += pct; }
        });
        document.getElementById('pie-count').style.background = countStops.length ? `conic-gradient(${countStops.join(', ')})` : 'none';

        // Update Headers
        cats.forEach(c => {
            const sum = state.tasks.filter(t => t.category === c && t.completion < 100).reduce((s, t) => s + t.allocated, 0);
            document.getElementById(`${c}-total`).innerText = `${Math.floor(sum)} min`;
        });
    }

    function renderTasks() {
        ['core', 'must', 'reward'].forEach(cat => document.getElementById(`list-${cat}`).innerHTML = '');
        
        state.tasks.forEach(t => {
            // Done tasks drop to the bottom and look greyed out
            const isDone = t.completion === 100;
            const remainingMins = Math.max(0, t.allocated - (t.elapsed / 60));
            
            const r = document.createElement('div'); 
            r.className = `task-card card-${t.category}`;
            if(isDone) r.style.opacity = '0.4';

            r.innerHTML = `
                <div class="task-header">
                    <div style="display:flex;align-items:center;">
                        ${!isDone ? `<button class="icon-btn start" onclick="startTaskFocus('${t.id}')" title="Enter Focus">▶</button>` : ''}
                        ${!isDone ? `<button class="icon-btn done" onclick="markDone('${t.id}')" title="Mark Done">✓</button>` : ''}
                        <div style="display:flex; flex-direction:column;">
                            <span class="task-name" style="${isDone ? 'text-decoration:line-through;' : ''}">${t.name}</span>
                            <span class="task-meta">${t.completion}% Done | ${isDone ? 'COMPLETED' : `${Math.floor(remainingMins)}m left`}</span>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center; gap: 10px;">
                        <span class="task-time" id="label-${t.id}">${Math.floor(t.allocated)} min</span>
                        <button class="icon-btn delete" onclick="deleteTask('${t.id}')">✕</button>
                    </div>
                </div>
                ${!isDone ? `
                    <div class="mini-progress"><div class="mini-progress-fill" style="width:${t.completion}%"></div></div>
                    <input type="range" id="slider-${t.id}" min="0" step="1" oninput="handleSlider('${t.id}', this.value)">
                ` : ''}`;
            
            document.getElementById(`list-${t.category}`).appendChild(r);
        });
        updateMainUI();
    }

    // --- Standard Actions & Helpers ---
    function handleSlider(id, v) { const t = state.tasks.find(x => x.id === id); if(t) { t.allocated = parseFloat(v); saveData(); updateMainUI(); } }
    
    function markDone(id) { 
        const t = state.tasks.find(x => x.id === id); 
        if(t) { t.completion = 100; saveData(); renderTasks(); } 
    }
    
    function deleteTask(id) { state.tasks = state.tasks.filter(x => x.id !== id); saveData(); renderTasks(); }
    
    function addTask(cat) { 
        const input = document.getElementById(`new-${cat}`);
        const name = input.value.trim();
        if(name){ 
            state.tasks.push({id: Date.now().toString(), name: name, allocated: 0, elapsed: 0, completion: 0, category: cat}); 
            input.value = ''; document.getElementById(`btn-${cat}`).disabled = true;
            saveData(); renderTasks(); 
        } 
    }
    function checkInput(e, cat) { document.getElementById(`btn-${cat}`).disabled = !e.target.value.trim(); if(e.key==='Enter') addTask(cat); }
    
    function parseTime(ts) { const [h, m] = ts.split(':').map(Number); const d = new Date(); d.setHours(h, m, 0, 0); return d; }
    function formatTime(s) { if(s<=0)return "00:00:00"; return [s/3600, (s%3600)/60, s%60].map(v => String(Math.floor(v)).padStart(2,'0')).join(':'); }
    
    function enforceLimits() { 
        const rem = Math.max(0, remainingSecondsDay/60);
        // Only enforce limits on active tasks
        const activeTasks = state.tasks.filter(t => t.completion < 100);
        const alc = activeTasks.reduce((s,t)=>s+t.allocated, 0);
        if(alc > rem && alc > 0) { activeTasks.forEach(t => t.allocated *= (rem/alc)); if(!activeTaskId) renderTasks(); }
    }
    
    function saveData() { 
        const stateToSave = { ...state, globalFocusMode: false }; 
        localStorage.setItem('timeBoxerState', JSON.stringify(stateToSave)); 
    }
    function loadData() { 
        const s = localStorage.getItem('timeBoxerState'); 
        if(s) { 
            const parsed = JSON.parse(s);
            parsed.tasks = parsed.tasks.map(t => ({...t, elapsed: t.elapsed || 0, completion: t.completion || 0, category: t.category || 'core'}));
            state = { ...state, ...parsed }; 
        } 
    }

    init();
</script>
</body>
</html>
